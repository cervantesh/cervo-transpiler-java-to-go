name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Build cross-platform binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          ldflags="-X github.com/cervantesh/cervo-transpiler-java-to-go/internal/version.Version=${version}"
          for target in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
            fi
            output="dist/j2go_${version}_${goos}_${goarch}${ext}"
            GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags "${ldflags}" -o "${output}" ./cmd/j2go
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
