name: Feature request
description: Propose a new feature, migration capability, CLI option, or report improvement.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What migration or developer workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, command, or API shape.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser / grammar
        - Semantic analysis
        - IR
        - Go emitter
        - CLI
        - Reports
        - Migration pipeline
        - Corpus evidence
        - AI sidecar
        - Documentation
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true when this is done?
